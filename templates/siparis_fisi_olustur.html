<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <script>(function(){var m=localStorage.getItem('gs_dark_mode')||'auto';var h=new Date().getHours();if(m==='on'||(m==='auto'&&(h>=20||h<7)))document.documentElement.classList.add('gs-dark');})()</script>
  <title>Sipariş Oluştur</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
  <style>
    body {
      margin: 0; 
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    .header {
      background: #333;
      color: #fff;
      padding: 15px;
    }
    h1 {
      margin: 0;
    }
    .container {
      width: 90%;
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="number"],
    select {
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      background: #007bff;
      color: #fff;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .back-link {
      color: #333;
      text-decoration: none;
      margin-bottom: 15px;
      display: inline-block;
    }
    .product-entry {
      margin: 20px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Fiş Oluştur</h1>
  </div>
  <div class="container">
    <!-- Anasayfa'ya dön linki (Örnek: sipariş listesine) -->
    <a href="{{ url_for('siparis_fisi_bp.siparis_fisi_sayfasi') }}" class="back-link">
      ← Sipariş Listesine Dön
    </a>

    <!-- Arama Formu -->
    <form method="GET" class="search-form" style="margin-bottom: 20px;">
      <input type="text" name="search" placeholder="Model kodu ara..." value="{{ request.args.get('search', '') }}">
      <button type="submit">Ara</button>
      {% if request.args.get('search') %}
        <a href="{{ url_for('siparis_fisi_bp.siparis_fisi_olustur') }}" class="clear-btn">Temizle</a>
      {% endif %}
    </form>

    <!-- Form: POST metoduyla siparis_fisi_olustur endpointine gidecek -->
    <form method="POST">
      <!-- ÇOKLU ÜRÜN GİRİŞ ALANI -->
      <div id="products-container">
        <!-- İlki örnek giriş satırı -->
        <div class="product-entry">
          <div class="form-group">
            <label>Model Kodu</label>
            <select class="model-select" name="model_codes[]" required>
              <option value="" disabled selected>Bir Model Seçin</option>
              {% for urun in urunler %}
                <option value="{{ urun.title }}">{{ urun.title }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Renk</label>
            <select class="color-select" name="colors[]" required disabled>
              <option value="" disabled selected>Önce model seçin</option>
            </select>
          </div>
          <div class="form-group tedarikci-group" style="display:flex;flex-direction:row;gap:10px;flex-wrap:wrap">
            <div style="flex:1;min-width:120px">
              <label>Tedarikçi Kodu</label>
              <input type="text" class="tedarikci-kodu-input" placeholder="Opsiyonel" style="width:100%;padding:8px;border-radius:4px;border:1px solid #ccc">
            </div>
            <div style="flex:1;min-width:120px">
              <label>Tedarikçi Adı Soyadı</label>
              <input type="text" class="tedarikci-adi-input" placeholder="Opsiyonel" style="width:100%;padding:8px;border-radius:4px;border:1px solid #ccc">
            </div>
            <div style="align-self:flex-end">
              <button type="button" class="tedarikci-kaydet-btn" style="padding:8px 14px;background:#28a745;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.85rem" disabled>Kaydet</button>
            </div>
          </div>
          <div class="form-group">
            <label>Çift Başı Maliyet ($ - Tedarikçi sayfasından otomatik)</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="number" step="0.01" name="cift_basi_fiyat[]" class="cift-basi-fiyat-input" value="0" style="flex:1">
              <span class="cift-basi-fiyat-hint" style="font-size:12px;color:#6c757d">—</span>
            </div>
          </div>
          <div class="beden-container" style="display: none;">
            <!-- Seçilen renk için her beden inputu buraya eklenecek -->
          </div>
        </div>
      </div>

      <!-- Yeni satır ekleme butonu -->
      <button type="button" id="add-product" style="margin: 10px 0;">+ Yeni Model Ekle</button>

      <!-- Formu Kaydet -->
      <button type="submit">Kaydet</button>
    </form>
  </div>

  <script>
  // Bu fonksiyon, her "ürün satırı" (product-entry) içindeki elementleri yönetiyor.
  function initializeProductEntry(productEntry) {
      const modelSelect = productEntry.querySelector('.model-select');
      const colorSelect = productEntry.querySelector('.color-select');
      const bedenContainer = productEntry.querySelector('.beden-container');
      const tedKoduInput = productEntry.querySelector('.tedarikci-kodu-input');
      const tedAdiInput = productEntry.querySelector('.tedarikci-adi-input');
      const tedKaydetBtn = productEntry.querySelector('.tedarikci-kaydet-btn');
      const ciftFiyatInput = productEntry.querySelector('.cift-basi-fiyat-input');
      const ciftFiyatHint = productEntry.querySelector('.cift-basi-fiyat-hint');

      modelSelect.addEventListener('change', function() {
          const selectedModel = this.value;
          colorSelect.innerHTML = '<option value="" disabled selected>Renk Seçin</option>';
          colorSelect.disabled = true;
          bedenContainer.style.display = 'none';
          tedKoduInput.value = '';
          tedAdiInput.value = '';
          tedKaydetBtn.disabled = true;

          if (ciftFiyatInput) ciftFiyatInput.value = 0;
          if (ciftFiyatHint) { ciftFiyatHint.textContent = '—'; ciftFiyatHint.style.color = '#6c757d'; }

          if (!selectedModel) return;

          // Tedarikçi sayfasındaki model maliyetini otomatik çek
          fetch(`/api/model_maliyet/${encodeURIComponent(selectedModel)}`)
              .then(r => r.json())
              .then(d => {
                  if (d && d.ok) {
                      if (d.toplam_usd > 0) {
                          if (ciftFiyatInput) ciftFiyatInput.value = d.toplam_usd.toFixed(2);
                          if (ciftFiyatHint) {
                              ciftFiyatHint.textContent = '$' + d.toplam_usd.toFixed(2) + (d.direk ? ' (direkt)' : ' (kalem toplamı)');
                              ciftFiyatHint.style.color = '#16a34a';
                          }
                      } else {
                          if (ciftFiyatHint) {
                              ciftFiyatHint.textContent = 'Maliyet girilmemiş — Tedarikçi sayfasından ekleyin';
                              ciftFiyatHint.style.color = '#dc2626';
                          }
                      }
                  }
              })
              .catch(err => console.error('maliyet fetch:', err));

          fetch(`/get_product_details/${selectedModel}`)
              .then(response => response.json())
              .then(data => {
                  if (data.success) {
                      data.colors.forEach(color => {
                          const option = document.createElement('option');
                          option.value = color;
                          option.textContent = color;
                          colorSelect.appendChild(option);
                      });
                      colorSelect.disabled = false;
                      colorSelect.dataset.productData = JSON.stringify(data.product_data);
                      // Tedarikçi bilgisini doldur
                      if (data.tedarikci) {
                          tedKoduInput.value = data.tedarikci.tedarikci_kodu || '';
                          tedAdiInput.value = data.tedarikci.tedarikci_adi || '';
                      }
                      tedKaydetBtn.disabled = false;
                  }
              })
              .catch(err => console.error(err));
      });

      // Tedarikçi kaydet butonu
      tedKaydetBtn.addEventListener('click', function() {
          const model = modelSelect.value;
          if (!model) return;
          tedKaydetBtn.disabled = true;
          tedKaydetBtn.textContent = '...';
          fetch('/update_tedarikci', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                  model_code: model,
                  tedarikci_kodu: tedKoduInput.value.trim(),
                  tedarikci_adi: tedAdiInput.value.trim()
              })
          })
          .then(r => r.json())
          .then(data => {
              tedKaydetBtn.textContent = data.success ? '✓ Kaydedildi' : 'Hata!';
              setTimeout(() => { tedKaydetBtn.textContent = 'Kaydet'; tedKaydetBtn.disabled = false; }, 1500);
          })
          .catch(() => { tedKaydetBtn.textContent = 'Hata!'; setTimeout(() => { tedKaydetBtn.textContent = 'Kaydet'; tedKaydetBtn.disabled = false; }, 1500); });
      });

      colorSelect.addEventListener('change', function() {
          const selectedColor = this.value;
          const productData = JSON.parse(this.dataset.productData || '{}');

          // Renk seçili değilse bedenleri gizle
          if (!selectedColor || !productData[selectedColor]) {
              bedenContainer.style.display = 'none';
              return;
          }
          bedenContainer.style.display = 'block';

          // Mevcut beden-inputlarını temizle
          bedenContainer.innerHTML = '';

          const barcodes = productData[selectedColor];
          // Bedenleri 35'ten 41'e kadar listeleyelim
          for (let size = 35; size <= 41; size++) {
              const barcode = barcodes[size.toString()];
              const div = document.createElement('div');
              div.className = 'form-group';
              div.style.cssText = 'display:flex;align-items:center;gap:8px;flex-wrap:wrap';
              div.innerHTML = `
                <label style="min-width:70px">Beden ${size}</label>
                <input type="number" name="beden_${size}[]" value="0" min="0" style="width:70px">
                <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#dc2626;font-weight:700;cursor:pointer">
                  <input type="checkbox" name="acil_${size}[]" value="1" style="accent-color:#dc2626"> ACİL
                </label>
                ${barcode ? `<span class="barcode-info">Barkod: ${barcode}</span>` : ''}
              `;
              bedenContainer.appendChild(div);
          }
      });
  }

  // Yeni satır ekleme butonuna tıklayınca, ilk satırı klonlayarak ekle
  document.getElementById('add-product').addEventListener('click', function() {
      const container = document.getElementById('products-container');
      // container içindeki ilk product-entry'i klonlayalım
      const firstEntry = container.querySelector('.product-entry');
      const newEntry = firstEntry.cloneNode(true);

      // Yeni satırdaki input/select alanlarını resetle
      newEntry.querySelectorAll('select').forEach(select => {
          select.selectedIndex = 0;
          if (select.classList.contains('color-select')) {
              select.disabled = true;
              select.dataset.productData = '';
          }
      });
      newEntry.querySelectorAll('input[type="number"]').forEach(inp => {
          inp.value = 0;
      });
      newEntry.querySelector('.beden-container').style.display = 'none';
      newEntry.querySelector('.beden-container').innerHTML = '';

      container.appendChild(newEntry);
      initializeProductEntry(newEntry);
  });

  // Sayfa yüklendiğinde, ilk satırı çalıştır
  initializeProductEntry(document.querySelector('.product-entry'));
  </script>
{% include 'includes/notification_popup.html' ignore missing %}
</body>
</html>
