
{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Stok Raporu</h2>
        <a href="{{ url_for('home.home') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-home me-1"></i> Anasayfa</a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Ürün ID</th>
                <th>Renk</th>
                <th>Beden</th>
                <th>Toplam Stok</th>
            </tr>
        </thead>
        <tbody>
            {% for stat in stock_stats %}
            <tr>
                <td>{{ stat.product_main_id }}</td>
                <td>{{ stat.color }}</td>
                <td>{{ stat.size }}</td>
                <td>{{ stat.total_stock }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
