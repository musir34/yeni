<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script>
      (function(){var m=localStorage.getItem('gs_dark_mode')||'auto';var h=new Date().getHours();var dark=m==='on'||(m==='auto'&&(h>=20||h<7));if(dark)document.documentElement.classList.add('gs-dark');})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Güllü Ayakkabı{% endblock %}</title>
    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="{{ url_for('static', filename='css/gullu-common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Global Toast Container -->
    <div id="gs-toast-container" aria-live="polite"
         style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:99999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;max-width:340px;">
    </div>

    <!-- jQuery (önce) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5.3 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Shell (toast, confirm, count-tween, refresh-manager) -->
    <script src="{{ url_for('static', filename='js/app-shell.js') }}"></script>
    <script src="{{ url_for('static', filename='js/user-activity-logger.js') }}"></script>
    <script>
        function otomatikYazdir() { console.log("Otomatik yazdır çalıştı"); }
        $(document).ready(function () {
            otomatikYazdir();
        });
    </script>
    {% block scripts %}{% endblock %}

    {% include 'includes/notification_popup.html' ignore missing %}
</body>
</html>
